<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Beep Oil &amp; Gas Data Management">
  <!-- Database cylinders (left stack) -->
  <rect x="40" y="30"  width="240" height="80" rx="20" ry="20" fill="currentColor"/>
  <circle cx="100" cy="70" r="24" fill="white"/>

  <rect x="40" y="170" width="180" height="60" rx="14" ry="14" fill="currentColor"/>
  <rect x="40" y="290" width="150" height="60" rx="14" ry="14" fill="currentColor"/>

  <!-- Gear (bottom-right, overlapping) -->
  <g transform="translate(300,290)">
    <circle cx="0" cy="0" r="65" fill="currentColor"/>
    <circle cx="0" cy="0" r="30" fill="white"/>
    <!-- Gear teeth (8 teeth) -->
    <g fill="currentColor">
      <rect x="-14" y="-100" width="28" height="35" rx="5"/>
      <rect x="-14" y="65"  width="28" height="35" rx="5"/>
      <rect x="65"  y="-14" width="35" height="28" rx="5"/>
      <rect x="-100" y="-14" width="35" height="28" rx="5"/>
      <rect x="43"  y="-82" width="28" height="35" rx="5" transform="rotate(45)"/>
      <rect x="-71" y="-82" width="28" height="35" rx="5" transform="rotate(-45)"/>
      <rect x="43"  y="47"  width="28" height="35" rx="5" transform="rotate(-45)"/>
      <rect x="-71" y="47"  width="28" height="35" rx="5" transform="rotate(45)"/>
    </g>
  </g>

  <!-- Curved connector arc between db and gear -->
  <path d="M 220 200 Q 340 200 300 290" fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="round"/>
</svg>
