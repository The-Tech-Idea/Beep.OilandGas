<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <title>Wellhead</title>
  <!-- Casing spool (bottom) -->
  <rect x="7" y="18" width="10" height="3" rx="0.5" />
  <!-- Tubing head spool (middle) -->
  <rect x="8" y="14" width="8" height="4" rx="0.5" />
  <!-- Christmas tree body (top) -->
  <rect x="9" y="9" width="6" height="5" rx="0.5" />
  <!-- Wing valves (horizontal) -->
  <line x1="3" y1="12" x2="9" y2="12" />
  <circle cx="3" cy="12" r="1.2" />
  <line x1="15" y1="12" x2="21" y2="12" />
  <circle cx="21" cy="12" r="1.2" />
  <!-- Master valve (top of tree) -->
  <line x1="12" y1="4" x2="12" y2="9" />
  <circle cx="12" cy="4" r="1.5" />
</svg>
