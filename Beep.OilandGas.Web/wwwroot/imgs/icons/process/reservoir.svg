<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <title>Reservoir</title>
  <!-- Surface line -->
  <line x1="2" y1="5" x2="22" y2="5" />
  <!-- Caprock layer -->
  <path d="M2 10 Q7 8 12 10 Q17 12 22 10" />
  <!-- Reservoir rock (porous layer) with dots -->
  <path d="M2 15 Q7 13 12 15 Q17 17 22 15" />
  <!-- Oil fill indication -->
  <path d="M2 20 Q7 18 12 20 Q17 22 22 20" />
  <!-- Porosity dots in reservoir layer -->
  <circle cx="7" cy="13" r="0.6" fill="currentColor" />
  <circle cx="12" cy="13.5" r="0.6" fill="currentColor" />
  <circle cx="17" cy="13" r="0.6" fill="currentColor" />
  <!-- Well bore through layers -->
  <line x1="18" y1="5" x2="18" y2="20" stroke-dasharray="2 1" />
</svg>
